<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Security -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
    default-src 'self';
    script-src 'self' 'unsafe-eval';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https: blob:;
    connect-src 'self' http://localhost:4000 ws://localhost:5173;
    frame-ancestors 'none';
  "
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- SEO -->
    <title>Pixel Raider — Build Beyond Limits</title>
    <meta
      name="description"
      content="Pixel Raider is a scalable technology ecosystem for developers, creators, and innovators. AI tools, dev resources, community, and more."
    />
    <meta
      name="keywords"
      content="Pixel Raider, AI, Development, Technology, Ecosystem"
    />
    <meta name="author" content="Pixel Raider" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pixelraider.dev" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pixelraider.dev" />
    <meta property="og:title" content="Pixel Raider — Build Beyond Limits" />
    <meta
      property="og:description"
      content="A scalable technology ecosystem for developers, creators, and innovators."
    />
    <meta property="og:image" content="/assets/images/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pixel Raider — Build Beyond Limits" />
    <meta
      name="twitter:description"
      content="A scalable technology ecosystem for developers, creators, and innovators."
    />
    <meta name="twitter:image" content="/assets/images/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#080B14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: #080b14;
          color: #fff;
          font-family: sans-serif;
          text-align: center;
          padding: 20px;
        "
      >
        <div>
          <h1>JavaScript Required</h1>
          <p>
            Pixel Raider requires JavaScript to run. Please enable it in your browser
            settings.
          </p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
